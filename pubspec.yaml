name: tekartik_browser_utils
version: 0.7.5
description: Browser utils
homepage: https://github.com/tekartik/browser_utils.dart
publish_to: none

environment:
  sdk: ^3.12.0
dependencies:
  path: ">=1.9.1"
  synchronized: any
  web: '>=0.5.1'
  tekartik_common_utils:
    git:
      url: https://github.com/tekartik/common_utils.dart
    version: '>=0.15.4'
  tekartik_js_utils:
    git:
      url: https://github.com/tekartik/js_utils.dart
      path: js_utils
    version: '>=0.1.1'
  tekartik_js_utils_interop:
    git:
      url: https://github.com/tekartik/js_utils.dart
      path: js_utils_interop
    version: '>=0.1.0'
  stack_trace:

dev_dependencies:
  process_run: ">=1.2.1+1"
  dev_build: ">=1.1.7+3"
  test: ">=1.31.0"
  build_runner: ">=2.15.0"
  build_test: '>=0.10.8'
  build_web_compilers: ">=4.4.19"

dependency_overrides:
  web: ">=1.1.1"
